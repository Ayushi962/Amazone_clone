<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homepage</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="navbar">
            <div class="navlogo border">
                <div class="logo">
                </div>
            </div>

            <div class="navaddress border">
                <p class="add1">Deliver to</p>
                <div class="addicon">
                    <i class="fa-solid fa-location-dot"></i>
                    <p class="add2">India</p>
                </div>
            </div>

            <div class="navsearch">
                <select class="search_select">
                    <option>All</option>
                </select>
                <input type="text" placeholder="Search Amazon" class="search_input">
                <div class="searchicon">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </div>
            </div>

            <div class="navsignin border">
                <p><span>Hello, Sign in</span></p>
                <p class="navone">Account & Lists</p>
            </div>

            <div class="navRAO border">
                <p><span>Returns</span></p>
                <p class="navone"> & Orders</p>
            </div>

            <div class="navcart border">
                <i class="fa-solid fa-cart-arrow-down"></i>
                Cart
            </div>
        </div>

        <div class="panel">
            <div class="all">
                <i class="fa-solid fa-bars"></i>
                All
            </div>
            <div class="panelops">
                <p>Today's Deals</p>
                <p>Customer Service</p>
                <p>Registry</p>
                <p>Gift Cards</p>
                <p>Sell</p>
            </div>
            <div class="paneldeals">
                Shop deals in Electronics
            </div>
        </div>
    </header>
</body>
</html>
